<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cat Clicker: God Edition Pro</title>
    <style>
        body { 
            text-align: center; font-family: 'Segoe UI', sans-serif; 
            background: #1a1a2e; color: white; margin: 0; padding-top: 60px; overflow-x: hidden;
            transition: 0.5s; position: relative; min-height: 100vh;
        }
        .admin-bg { animation: rgbBg 5s infinite linear; }
        @keyframes rgbBg { 0% { background: #ff0000; } 33% { background: #00ff00; } 66% { background: #0000ff; } 100% { background: #ff0000; } }
        
        .tab { display: none; padding: 20px; padding-bottom: 80px; }
        .active { display: block; }
        
        button { 
            padding: 12px 18px; margin: 5px; cursor: pointer; background: #6a11cb; 
            color: white; border: none; border-radius: 10px; font-weight: bold; transition: 0.2s;
        }
        button:disabled { background: #444; opacity: 0.6; }
        .info-text { font-size: 12px; color: #aaa; margin: 5px auto; max-width: 300px; }
        
        #cat-farm { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; margin: 20px auto; min-height: 220px; }
        #cat { width: 160px; height: 160px; object-fit: contain; cursor: pointer; }
        .cat-mini { width: 45px !important; height: 45px !important; object-fit: contain; animation: bounce 2s infinite; }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
        
        .admin-controls { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    </style>
</head>
<body id="mainBody">

    <h1>✨ Cosmic Cat Clicker ✨</h1>
    <div style="font-size: 24px; color: #00d2ff;">🐾 <span id="coinsDisplay">0</span></div>
    
    <div id="cat-farm">
        <img id="cat" src="https://cdn-icons-png.flaticon.com/512/616/616430.png" alt="Кот">
    </div>
    
    <div class="tabs-menu">
        <button onclick="showTab('upgrades')">Магазин</button>
        <button onclick="showTab('cosmos')">🌌 Космос</button>
        <button onclick="showTab('prestige')">Перерождение</button>
        <button id="adminTabBtn" onclick="showTab('admin')" style="display:none; background: #ff4757;">🛠 АДМИН</button>
    </div>

    <div id="upgrades" class="tab active">
        <button onclick="buyUpgrade('click', 1, 'priceClick1', 1.15)">+1 сила (<span id="priceClick1">10</span>)</button>
        <button onclick="buyUpgrade('click', 10, 'priceClick10', 1.15)">+10 сила (<span id="priceClick10">100</span>)</button>
        <button onclick="buyUpgrade('auto', 1, 'priceAuto1', 1.2)">+1/сек (<span id="priceAuto1">100</span>)</button>
        <button onclick="buyUpgrade('auto', 10, 'priceAuto10', 1.2)">+10/сек (<span id="priceAuto10">1000</span>)</button>
    </div>

    <div id="cosmos" class="tab">
        <h2>Созвездия</h2>
        <button onclick="alert('Ленивый кот: Автокликеры x10, но клик = 0.')">💤 Ленивый Кот</button>
        <div class="info-text">Автокликеры приносят в 10 раз больше, но клик не работает.</div>
        <button onclick="alert('Тыгыдык: Бонус к силе клика при ожидании.')">🐈 Тыгыдык</button>
        <div class="info-text">Сила клика растет каждую секунду, если вы не кликаете.</div>
    </div>

    <div id="prestige" class="tab">
        <button id="prestigeBtn" onclick="doPrestige()" disabled>Перерождение (100к 🐾)</button>
    </div>

    <div id="admin" class="tab">
        <div style="background: rgba(255,255,255,0.1); padding: 20px; border-radius: 20px; border: 2px solid gold;">
            <h2 style="color: gold;">⚡ ПАНЕЛЬ БОГА ⚡</h2>
            <div class="admin-controls">
                <button onclick="coins += 1000000; update();">+1М Коинов</button>
                <button onclick="prestigeMult *= 100; update();" style="background: #e67e22;">x100 Мульти</button>
                <button onclick="startCatRain()" style="background: #c0392b;">🐱 Дождь</button>
                <button onclick="document.getElementById('mainBody').classList.toggle('admin-bg');">RGB Фон</button>
                <button onclick="boostSpeed()" style="grid-column: span 2; background: #27ae60;">🚀 Супер-скорость (x10)</button>
            </div>
        </div>
    </div>

    <img id="secret-paw" src="https://cdn-icons-png.flaticon.com/512/36/36467.png" style="width:30px; opacity:0.2; cursor:pointer;">

    <script>
        let coins = 0; let clickPower = 1; let autoCPS = 0; let prestigeMult = 1; let speedBoost = 1;
        let prices = { priceClick1: 10, priceClick10: 100, priceAuto1: 100, priceAuto10: 1000 };
        
        function update() {
            document.getElementById('coinsDisplay').innerText = Math.floor(coins);
            for (let key in prices) { if(document.getElementById(key)) document.getElementById(key).innerText = Math.floor(prices[key]); }
            document.getElementById('prestigeBtn').disabled = coins < 100000;
        }

        document.getElementById('cat').onclick = () => { coins += clickPower * prestigeMult; update(); };

        function buyUpgrade(type, amount, priceKey, growth) {
            let p = prices[priceKey];
            if (coins >= p) {
                coins -= p;
                if (type === 'click') clickPower += amount; else autoCPS += amount;
                prices[priceKey] *= growth;
                update();
            }
        }

        function boostSpeed() {
            speedBoost = 10;
            setTimeout(() => { speedBoost = 1; alert("Ускорение закончилось!"); }, 30000);
        }

        function doPrestige() {
            if (coins >= 100000) {
                coins = 0; clickPower = 1; autoCPS = 0;
                prestigeMult += 0.5;
                const mini = document.createElement('img');
                mini.src = "https://cdn-icons-png.flaticon.com/512/616/616430.png";
                mini.className = "cat-mini";
                mini.style.filter = `hue-rotate(${Math.random()*360}deg)`;
                document.getElementById('cat-farm').appendChild(mini);
                update();
            }
        }

        function startCatRain() {
            let i = setInterval(() => {
                const c = document.createElement('img');
                c.src = "https://cdn-icons-png.flaticon.com/512/616/616430.png";
                c.style.position = 'fixed'; c.style.top = '-200px'; c.style.left = Math.random()*90+'vw';
                c.style.width = '150px'; c.style.animation = 'fall 3s linear forwards';
                document.body.appendChild(c);
                setTimeout(() => c.remove(), 4000);
            }, 300);
            setTimeout(() => clearInterval(i), 5000);
        }

        document.getElementById('secret-paw').onclick = () => {
            document.getElementById('adminTabBtn').style.display = 'inline-block';
        };

        function showTab(id) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }
        
        setInterval(() => { coins += autoCPS * prestigeMult * speedBoost; update(); }, 1000);
    </script>
</body>
</html>
