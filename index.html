<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Cat Clicker Evolution</title>
    <style>
        body { text-align: center; font-family: sans-serif; background: #ffe4e1; }
        .tab { display: none; padding: 20px; }
        .active { display: block; }
        button { padding: 12px 20px; margin: 8px; cursor: pointer; background: #ff69b4; color: white; border: none; border-radius: 10px; font-weight: bold; }
        button:disabled { background: #ccc; }
        .stats { font-size: 20px; color: #d63384; margin: 5px; }
        #cat-farm { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; margin-top: 20px; }
        .cat-icon { width: 80px; }
        #admin-panel { display: none; background: #ffcccc; padding: 15px; border: 2px solid red; margin: 20px; }
    </style>
</head>
<body>
    <h1>🐾 Cat Clicker Pro 🐾</h1>
    <div class="stats">Каткойнов: <span id="coins">0</span></div>
    <div class="stats">Всего накоплено: <span id="totalLifetime">0</span></div>
    
    <div id="cat-farm">
        <img id="cat" src="https://cdn-icons-png.flaticon.com/512/616/616430.png" style="width:200px; cursor:pointer">
    </div>
    
    <div class="tabs">
        <button onclick="showTab('upgrades')">Клики</button>
        <button onclick="showTab('auto')">Авто</button>
        <button onclick="showTab('special')">Королевский</button>
        <button onclick="showTab('prestige')">Перерождение</button>
    </div>

    <div id="upgrades" class="tab active">
        <button onclick="buyClick(1, 10)">+1 сила (10 🐾)</button>
        <button onclick="buyClick(10, 100)">+10 сила (100 🐾)</button>
    </div>
    <div id="auto" class="tab">
        <button onclick="buyAuto(1, 100)">+1/сек (100 🐾)</button>
        <button onclick="buyAuto(10, 1000)">+10/сек (1000 🐾)</button>
        <button onclick="buyAuto(100, 10000)">+100/сек (10000 🐾)</button>
    </div>
    <div id="special" class="tab">
        <button id="royalBtn" onclick="buyRoyal()">Королевский режим (50 000 🐾, 5x, +30 клик)</button>
    </div>
    <div id="prestige" class="tab">
        <button id="prestigeBtn" onclick="doPrestige()" disabled>Перерождение (100 000 🐾)</button>
    </div>

    <div id="admin-panel">
        <h3>Админ-панель</h3>
        <input type="number" id="cheatCoins" placeholder="Кол-во коинов">
        <button onclick="cheat()">Начислить</button>
    </div>

    <script>
        let coins = 0;
        let totalLifetime = 0;
        let clickPower = 1;
        let autoCPS = 0;
        let royalMult = 1;
        let royalBonus = 0;
        let prestigeMult = 1;
        let prestigeCount = 0;

        function update() {
            document.getElementById('coins').innerText = Math.floor(coins);
            document.getElementById('totalLifetime').innerText = Math.floor(totalLifetime);
            document.getElementById('prestigeBtn').disabled = coins < 100000;
            if (totalLifetime >= 1000000) document.getElementById('admin-panel').style.display = 'block';
        }

        document.getElementById('cat').onclick = () => {
            let gain = (clickPower + royalBonus) * royalMult * prestigeMult;
            coins += gain;
            totalLifetime += gain;
            update();
        };

        function buyClick(p, c) { if (coins >= c) { coins -= c; clickPower += p; update(); } }
        function buyAuto(a, c) { if (coins >= c) { coins -= c; autoCPS += a; update(); } }
        function buyRoyal() {
            if (coins >= 50000) { coins -= 50000; royalMult = 5; royalBonus = 30; document.getElementById('royalBtn').disabled = true; update(); }
        }

        function doPrestige() {
            if (coins >= 100000) {
                prestigeCount++;
                prestigeMult += 0.5; // Увеличиваем множитель за каждое перерождение
                coins = 0; clickPower = 1; autoCPS = 0; royalMult = 1; royalBonus = 0;
                document.getElementById('royalBtn').disabled = false;
                
                // Добавляем котика
                let img = document.createElement('img');
                img.src = "https://cdn-icons-png.flaticon.com/512/616/616430.png";
                img.className = "cat-icon";
                document.getElementById('cat-farm').appendChild(img);
                
                update();
            }
        }

        function cheat() {
            coins += parseInt(document.getElementById('cheatCoins').value);
            update();
        }

        function showTab(id) { document.querySelectorAll('.tab').forEach(t => t.classList.remove('active')); document.getElementById(id).classList.add('active'); }
        setInterval(() => { coins += autoCPS; totalLifetime += autoCPS; update(); }, 1000);
    </script>
</body>
</html>
