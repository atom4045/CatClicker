<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cat Clicker: Cosmic God Edition</title>
    <style>
        :root { --p-color: #6a11cb; --s-color: #2575fc; --gold: #ffd700; }
        body { 
            text-align: center; font-family: 'Segoe UI', sans-serif; 
            background: #0f0c29; color: white; margin: 0; padding-top: 50px;
            min-height: 100vh; overflow: hidden; transition: 0.5s;
        }
        
        /* ЭФФЕКТ ПЛАВАЮЩЕГО ФОНА */
        .float-bg { animation: floating 3s infinite ease-in-out; }
        @keyframes floating {
            0%, 100% { background-position: 0% 50%; filter: hue-rotate(0deg); transform: scale(1); }
            50% { background-position: 100% 50%; filter: hue-rotate(45deg); transform: scale(1.05); }
        }

        #top-ui {
            position: fixed; top: 0; width: 100%; background: rgba(0,0,0,0.8);
            display: flex; justify-content: space-around; padding: 10px 0; z-index: 100;
            border-bottom: 2px solid var(--p-color);
        }
        .stat-box { font-weight: bold; font-size: 13px; color: #00d2ff; }

        #coinsDisplay { font-size: 45px; font-weight: bold; text-shadow: 0 0 20px var(--s-color); margin: 15px 0; }
        
        #cat-farm { display: flex; flex-wrap: wrap; justify-content: center; align-items: center; min-height: 200px; }
        #cat { width: 180px; transition: 0.1s; cursor: pointer; filter: drop-shadow(0 0 15px var(--p-color)); user-select: none; z-index: 10; }
        #cat:active { transform: scale(0.8); }

        .tab-btn { background: #1f1c2c; border: 1px solid var(--s-color); color: white; padding: 8px 12px; margin: 2px; border-radius: 5px; cursor: pointer; }
        .active-btn { background: var(--p-color); border-color: white; }
        .tab-content { display: none; padding: 15px; max-width: 450px; margin: 0 auto; background: rgba(0,0,0,0.4); border-radius: 15px; }
        .active-tab { display: block; }

        .upgrade-card {
            background: rgba(255,255,255,0.05); margin: 8px 0; padding: 12px;
            border-radius: 10px; border-left: 4px solid var(--s-color);
            display: flex; justify-content: space-between; align-items: center;
        }

        /* ЧАСТИЦЫ И ЗВЕЗДЫ */
        .star { position: fixed; width: 25px; pointer-events: none; z-index: 5; animation: starFall 1.5s linear forwards; }
        @keyframes starFall { to { transform: translateY(110vh) rotate(540deg); opacity: 0; } }
        
        .click-txt { position: fixed; pointer-events: none; font-weight: bold; z-index: 100; animation: flyUp 0.7s forwards; }
        @keyframes flyUp { to { transform: translateY(-80px); opacity: 0; } }

        .shockwave { position: fixed; border: 3px solid #00ff88; border-radius: 50%; pointer-events: none; z-index: 99; animation: shock 0.4s ease-out forwards; }
        @keyframes shock { 0% { width: 0; height: 0; opacity: 1; } 100% { width: 400px; height: 400px; opacity: 0; margin-left: -200px; margin-top: -200px; } }

        #secret-menu { display: none; border: 2px solid var(--gold); background: #222; padding: 15px; margin-top: 10px; border-radius: 10px; }
        #secret-paw { position: fixed; bottom: 10px; left: 10px; width: 30px; opacity: 0.1; cursor: pointer; }
    </style>
</head>
<body id="mainBody">

    <div id="top-ui">
        <div class="stat-box">⚔️ Сила: <span id="powerStat">1</span></div>
        <div class="stat-box">🤖 Авто: <span id="autoStat">0</span>/с</div>
        <div class="stat-box" style="color:var(--gold)">🌀 Мульти: x<span id="multStat">1.0</span></div>
        <div class="stat-box">🕒 Эффект: <span id="timerStat">нет</span></div>
    </div>

    <div id="coinsDisplay">0</div>

    <div id="cat-farm">
        <img id="cat" src="https://cdn-icons-png.flaticon.com/512/616/616430.png" onmousedown="handleTap(event)">
    </div>

    <div class="tabs-menu">
        <button class="tab-btn active-btn" onclick="openTab(event, 'shop')">Магазин</button>
        <button class="tab-btn" onclick="openTab(event, 'cosmos')">🌌 Космос</button>
        <button class="tab-btn" onclick="openTab(event, 'prestige')">✨ Дух</button>
        <button id="adminTabBtn" class="tab-btn" style="display:none; color: #ff4757;" onclick="openTab(event, 'admin')">🛠 БОГ</button>
    </div>

    <div id="shop" class="tab-content active-tab">
        <div class="upgrade-card"><span>+1 Сила</span><button onclick="buy('click', 1, 'pC1', 1.15, event)">💰 <span id="pC1">10</span></button></div>
        <div class="upgrade-card"><span>+1 Авто (Дешево)</span><button onclick="buy('auto', 1, 'pA1', 1.12, event)">💰 <span id="pA1">50</span></button></div>
        <div class="upgrade-card"><span>+10 Авто</span><button onclick="buy('auto', 10, 'pA10', 1.15, event)">💰 <span id="pA10">500</span></button></div>
    </div>

    <div id="cosmos" class="tab-content">
        <h3>Космические способности (1 мин)</h3>
        <p>Нужно 500 кликов для активации</p>
        <div class="upgrade-card">
            <span>🚀 Гипер-Тап (x2 скорость + фон)</span>
            <button onclick="activateCosmos('hyper')" id="btnHyper">ПУСК</button>
        </div>
        <div class="upgrade-card">
            <span>🕳️ Черная Дыра (20% Шанс Free)</span>
            <button onclick="activateCosmos('hole')" id="btnHole">ПУСК</button>
        </div>
        <div class="upgrade-card">
            <span>🌟 Звездопад (Бесконечные звезды)</span>
            <button onclick="activateCosmos('stars')" id="btnStars">ПУСК</button>
        </div>
    </div>

    <div id="prestige" class="tab-content">
        <div id="millionaireUI" style="display:none;">
            <h3 style="color:var(--gold)">🏆 Меню Миллионера</h3>
            <button onclick="coins += 50000000" style="background:gold; color:black;">ВЫДАТЬ 50 МЛН</button>
            <button onclick="pMult += 50">+50 МУЛЬТИ</button>
        </div>
        <div id="normalPrestige">
            <p>Перерождение доступно от 100к</p>
            <button id="prestigeBtn" style="width:100%; padding:15px;" onclick="prestige()" disabled>СБРОС</button>
        </div>
    </div>

    <div id="admin" class="tab-content">
        <button onclick="coins += 100000000; update();">MAX MONEY</button>
        <button onclick="document.body.classList.toggle('float-bg')">ТЕСТ ФОНА</button>
    </div>

    <img id="secret-paw" src="https://cdn-icons-png.flaticon.com/512/36/36467.png">

    <script>
        let coins = 0, clickPower = 1, autoCPS = 0, pMult = 1, totalTaps = 0;
        let activeEffect = null, timeLeft = 0;
        let prices = { pC1: 10, pA1: 50, pA10: 500 };
        const colors = ['#FF5733', '#33FF57', '#3357FF', '#FFD700', '#FF33A1', '#9B59B6'];

        function update() {
            document.getElementById('coinsDisplay').innerText = Math.floor(coins).toLocaleString();
            document.getElementById('powerStat').innerText = (activeEffect === 'hyper' ? clickPower * 2 : clickPower);
            document.getElementById('autoStat').innerText = autoCPS;
            document.getElementById('multStat').innerText = pMult.toFixed(1);
            document.getElementById('timerStat').innerText = timeLeft > 0 ? timeLeft + "с" : "нет";
            
            document.getElementById('prestigeBtn').disabled = coins < 100000;
            if(coins >= 100000000) document.getElementById('millionaireUI').style.display = 'block';

            for(let k in prices) if(document.getElementById(k)) document.getElementById(k).innerText = Math.floor(prices[k]);
            
            // Кнопки космоса
            document.getElementById('btnHyper').disabled = totalTaps < 500 || timeLeft > 0;
            document.getElementById('btnHole').disabled = totalTaps < 500 || timeLeft > 0;
            document.getElementById('btnStars').disabled = totalTaps < 500 || timeLeft > 0;
        }

        function handleTap(e) {
            let mult = (activeEffect === 'hyper' ? 2 : 1);
            let gain = clickPower * pMult * mult;
            
            coins += gain;
            totalTaps++;
            
            createTxt(e.clientX, e.clientY, "+" + Math.floor(gain), "#00d2ff");
            if(activeEffect === 'stars' || Math.random() > 0.7) spawnStar();

            update();
        }

        function spawnStar() {
            const s = document.createElement('img');
            s.src = "https://cdn-icons-png.flaticon.com/512/1828/1828884.png";
            s.className = 'star';
            s.style.left = Math.random() * 95 + "vw";
            s.style.top = "-50px";
            document.body.appendChild(s);
            setTimeout(() => {
                coins += (clickPower * pMult);
                s.remove();
                update();
            }, 1500);
        }

        function buy(type, amount, key, growth, e) {
            let cost = prices[key];
            let isFree = (activeEffect === 'hole' && Math.random() < 0.20);

            if (coins >= cost || isFree) {
                if(!isFree) coins -= cost;
                else createTxt(e.clientX, e.clientY, "FREE!", "#00ff88");

                if (type === 'click') clickPower += amount;
                else autoCPS += amount;
                prices[key] *= growth;
                
                showShockwave(e.clientX, e.clientY);
                update();
            }
        }

        function activateCosmos(type) {
            if(totalTaps >= 500) {
                totalTaps = 0;
                activeEffect = type;
                timeLeft = 60; // 1 минута
                if(type === 'hyper') document.body.classList.add('float-bg');
                update();
            }
        }

        function prestige() {
            pMult += 1;
            coins = 0; clickPower = 1; autoCPS = 0; totalTaps = 0;
            prices = { pC1: 10, pA1: 50, pA10: 500 };
            document.body.classList.remove('float-bg');
            update();
        }

        function createTxt(x, y, txt, color) {
            const div = document.createElement('div');
            div.className = 'click-txt';
            div.innerText = txt;
            div.style.left = x + 'px';
            div.style.top = y + 'px';
            div.style.color = color;
            document.body.appendChild(div);
            setTimeout(() => div.remove(), 700);
        }

        function showShockwave(x, y) {
            const s = document.createElement('div');
            s.className = 'shockwave';
            s.style.left = x + 'px';
            s.style.top = y + 'px';
            document.body.appendChild(s);
            setTimeout(() => s.remove(), 400);
        }

        function openTab(evt, name) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active-tab'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active-btn'));
            document.getElementById(name).classList.add('active-tab');
            evt.currentTarget.classList.add('active-btn');
        }

        document.getElementById('secret-paw').onclick = () => {
            document.getElementById('adminTabBtn').style.display = 'inline-block';
        };

        setInterval(() => {
            coins += autoCPS * pMult;
            if(timeLeft > 0) {
                timeLeft--;
                if(timeLeft <= 0) {
                    activeEffect = null;
                    document.body.classList.remove('float-bg');
                }
            }
            update();
        }, 1000);

        update();
    </script>
</body>
</html>
