<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Cat Clicker Evolution</title>
    <style>
        body { text-align: center; font-family: 'Arial', sans-serif; background: #ffe4e1; }
        #cat { width: 250px; cursor: pointer; margin-top: 20px; transition: 0.2s; }
        #cat:hover { transform: scale(1.05); }
        .counter { font-size: 32px; font-weight: bold; color: #d63384; }
        .shop { margin-top: 30px; border-top: 2px solid #ccc; padding-top: 20px; }
        button { display: block; margin: 10px auto; padding: 10px 20px; font-size: 16px; cursor: pointer; background: #ff69b4; border: none; border-radius: 10px; color: white; }
    </style>
</head>
<body>
    <h1>🐾 Cat Clicker Evolution 🐾</h1>
    <div class="counter">Каткойнов: <span id="coins">0</span></div>
    <p>Всего кликов: <span id="totalClicks">0</span></p>
    <img id="cat" src="https://cdn-icons-png.flaticon.com/512/616/616430.png" alt="Кот">
    <p>Доход: <span id="cps">0</span> в секунду</p>
    
    <div class="shop">
        <button id="upg1">Авто-клик (10 🐾, +1/сек)</button>
        <button id="upg2">Бизнес-кот (100 🐾, +10/сек)</button>
        <button id="upg3">Королевский кот (1000 🐾, x30 за клик)</button>
    </div>

    <script>
        let coins = 0;
        let totalClicks = 0;
        let cps = 0;
        let clickValue = 1; 
        const coinsEl = document.getElementById('coins');
        const totalEl = document.getElementById('totalClicks');
        const cpsEl = document.getElementById('cps');
        const catImg = document.getElementById('cat');

        const catImages = [
            "https://cdn-icons-png.flaticon.com/512/616/616430.png",
            "https://cdn-icons-png.flaticon.com/512/616/616489.png",
            "https://cdn-icons-png.flaticon.com/512/2809/2809828.png",
            "https://cdn-icons-png.flaticon.com/512/3069/3069176.png",
            "https://cdn-icons-png.flaticon.com/512/1998/1998619.png",
            "https://cdn-icons-png.flaticon.com/512/2299/2299323.png",
            "https://cdn-icons-png.flaticon.com/512/1864/1864509.png",
            "https://cdn-icons-png.flaticon.com/512/2553/2553642.png",
            "https://cdn-icons-png.flaticon.com/512/4047/4047321.png",
            "https://cdn-icons-png.flaticon.com/512/763/763742.png"
        ];

        document.getElementById('cat').onclick = () => {
            coins += clickValue;
            totalClicks++;
            coinsEl.innerText = Math.floor(coins);
            totalEl.innerText = totalClicks;
            
            let level = Math.floor(totalClicks / 10000);
            if (level < catImages.length) catImg.src = catImages[level];
        };

        document.getElementById('upg1').onclick = () => {
            if (coins >= 10) { coins -= 10; cps += 1; coinsEl.innerText = Math.floor(coins); cpsEl.innerText = cps; }
        };
        document.getElementById('upg2').onclick = () => {
            if (coins >= 100) { coins -= 100; cps += 10; coinsEl.innerText = Math.floor(coins); cpsEl.innerText = cps; }
        };
        document.getElementById('upg3').onclick = () => {
            if (coins >= 1000) { 
                coins -= 1000; 
                clickValue = 30; 
                coinsEl.innerText = Math.floor(coins);
                document.getElementById('upg3').disabled = true;
                alert("Королевский кот активирован! Теперь клик дает 30!");
            }
        };

        setInterval(() => { 
            coins += (cps / 10); // Добавляем доход 10 раз в секунду для плавности
            coinsEl.innerText = Math.floor(coins); 
        }, 100);
    </script>
</body>
</html>
