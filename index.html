<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Cat Clicker ULTRA FIX</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { 
            background: #0f0c29; color: white; font-family: sans-serif; 
            text-align: center; margin: 0; padding-top: 60px; overflow-x: hidden;
        }
        #top-ui { 
            position: fixed; top: 0; width: 100%; background: #000; 
            display: flex; justify-content: space-around; padding: 10px 0; z-index: 100;
            border-bottom: 2px solid gold;
        }
        .stat { font-size: 14px; color: #00d2ff; font-weight: bold; }
        
        #coinsDisplay { font-size: 50px; margin: 20px; color: gold; text-shadow: 0 0 10px orange; }
        
        #cat { width: 200px; cursor: pointer; transition: 0.1s; z-index: 5; position: relative; }
        #cat:active { transform: scale(0.9); }

        .tabs { display: flex; justify-content: center; flex-wrap: wrap; gap: 5px; margin: 20px 0; }
        .tab-btn { 
            background: #2a1b4d; border: 1px solid gold; color: white; 
            padding: 10px; cursor: pointer; border-radius: 5px;
        }
        .active-btn { background: gold; color: black; }

        .content { 
            display: none; max-width: 400px; margin: 0 auto 100px auto; 
            background: rgba(255,255,255,0.05); padding: 20px; border-radius: 15px;
        }
        .show { display: block; }

        .card { 
            display: flex; justify-content: space-between; align-items: center; 
            background: rgba(0,0,0,0.3); padding: 10px; margin: 10px 0; border-radius: 10px;
            border-left: 4px solid #00d2ff;
        }
        button.buy { background: #4b0082; color: white; border: 1px solid gold; padding: 8px; cursor: pointer; border-radius: 4px; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }

        /* Эффекты */
        .paw { position: fixed; pointer-events: none; font-size: 24px; animation: up 0.7s forwards; z-index: 100; }
        @keyframes up { to { transform: translateY(-100px); opacity: 0; } }
        
        .floating { animation: move 3s infinite alternate; background: linear-gradient(45deg, #1a0a33, #330a1a); }
        @keyframes move { from { filter: hue-rotate(0deg); } to { filter: hue-rotate(90deg); } }

        #secret-paw { position: fixed; bottom: 10px; left: 10px; width: 30px; opacity: 0.2; cursor: pointer; }
    </style>
</head>
<body id="bdy">

<div id="top-ui">
    <div class="stat">⚔️ <span id="pwrS">1</span></div>
    <div class="stat">🤖 <span id="cpsS">0</span></div>
    <div class="stat">🍖 <span id="foodS">0</span></div>
    <div class="stat">🌀 x<span id="mltS">1.0</span></div>
</div>

<div id="coinsDisplay">0</div>

<img id="cat" src="https://cdn-icons-png.flaticon.com/512/616/616430.png" onclick="doTap(event)">

<div class="tabs">
    <button class="tab-btn active-btn" onclick="openTab('shop', this)">Магазин</button>
    <button class="tab-btn" onclick="openTab('kitchen', this)">Кухня</button>
    <button class="tab-btn" onclick="openTab('cosmos', this)">Космос</button>
    <button class="tab-btn" onclick="openTab('royal', this)">Король</button>
    <button class="tab-btn" onclick="openTab('spirit', this)">Дух</button>
    <button id="godBtn" class="tab-btn" style="display:none; color:red;" onclick="openTab('admin', this)">БОГ</button>
</div>

<div id="shop" class="content show">
    <h3>Улучшения</h3>
    <div class="card"><span>+1 Клик</span><button class="buy" onclick="buy('c', 1, 10, 1.2)">💰 <span id="pc1">10</span></button></div>
    <div class="card"><span>+10 Клик</span><button class="buy" onclick="buy('c', 10, 150, 1.3)">💰 <span id="pc10">150</span></button></div>
    <div class="card"><span>+100 Клик</span><button class="buy" onclick="buy('c', 100, 2000, 1.4)">💰 <span id="pc100">2000</span></button></div>
    <div class="card"><span>+1000 Клик</span><button class="buy" onclick="buy('c', 1000, 30000, 1.5)">💰 <span id="pc1000">30000</span></button></div>
    <div class="card"><span>+1 Авто</span><button class="buy" onclick="buy('a', 1, 50, 1.2)">💰 <span id="pa1">50</span></button></div>
    <div class="card"><span>+10 Авто</span><button class="buy" onclick="buy('a', 10, 800, 1.3)">💰 <span id="pa10">800</span></button></div>
</div>

<div id="kitchen" class="content">
    <h3>🍖 Кухня</h3>
    <p>Корм: <span id="fAmt">0</span></p>
    <button class="tab-btn" onclick="eat()">ПОКОРМИТЬ (100 🍖)</button>
    <p id="fTimer" style="color:lime"></p>
    <small>Эффект: x2 доход и -30% цены на 1 мин.</small>
</div>

<div id="cosmos" class="content">
    <h3>🌌 Космос</h3>
    <p>Энергия (клики): <span id="nrg">0</span>/500</p>
    <button class="buy" id="ab1" onclick="useAb('h')">Гипер-Тап</button>
    <button class="buy" id="ab2" onclick="useAb('b')">Черная дыра</button>
</div>

<div id="royal" class="content">
    <h3>👑 Королевство</h3>
    <button id="rBtn" class="tab-btn" onclick="buyRoyal()">СТАТЬ КОРОЛЕМ (50,000)</button>
    <p id="rStatus">Вы: Простолюдин</p>
</div>

<div id="spirit" class="content">
    <h3>✨ Дух</h3>
    <button id="preBtn" class="tab-btn" onclick="doPrestige()">ПЕРЕРОЖДЕНИЕ (100,000)</button>
    <p>Дает +1 к множителю и 100 корма.</p>
</div>

<div id="admin" class="content">
    <h3>🛠 ПАНЕЛЬ БОГА</h3>
    <button onclick="money(1000000)">+1 МЛН</button>
    <button onclick="money(1000000000)">+1 МЛРД</button>
    <button onclick="food += 1000; refresh()">+1000 Корма</button>
    <button onclick="mult += 100; refresh()">+100 Множитель</button>
</div>

<img id="secret-paw" src="https://cdn-icons-png.flaticon.com/512/36/36467.png" onclick="god()">

<script>
    // ПЕРЕМЕННЫЕ
    let coins = 0, pwr = 1, auto = 0, mult = 1, rMult = 1, food = 0, energy = 0;
    let isFed = false, fedT = 0, abType = null, abT = 0;
    let p = { c1:10, c10:150, c100:2000, c1000:30000, a1:50, a10:800 };

    // ОБНОВЛЕНИЕ
    function refresh() {
        let m = mult * rMult * (isFed ? 2 : 1);
        let curP = pwr * m * (abType === 'h' ? 2 : 1);
        
        document.getElementById('coinsDisplay').innerText = Math.floor(coins).toLocaleString();
        document.getElementById('pwrS').innerText = Math.floor(curP);
        document.getElementById('cpsS').innerText = Math.floor(auto * m);
        document.getElementById('foodS').innerText = food;
        document.getElementById('fAmt').innerText = food;
        document.getElementById('mltS').innerText = m.toFixed(1);
        document.getElementById('nrg').innerText = energy;
        
        // Цены
        let sale = isFed ? 0.7 : 1;
        document.getElementById('pc1').innerText = Math.floor(p.c1 * sale);
        document.getElementById('pc10').innerText = Math.floor(p.c10 * sale);
        document.getElementById('pc100').innerText = Math.floor(p.c100 * sale);
        document.getElementById('pc1000').innerText = Math.floor(p.c1000 * sale);
        document.getElementById('pa1').innerText = Math.floor(p.a1 * sale);
        document.getElementById('pa10').innerText = Math.floor(p.a10 * sale);

        // Блокировка кнопок
        document.getElementById('preBtn').disabled = coins < 100000;
        document.getElementById('ab1').disabled = (energy < 500 || abT > 0);
        document.getElementById('ab2').disabled = (energy < 500 || abT > 0);
        document.getElementById('fTimer').innerText = isFed ? "Сытость: " + fedT + "с" : "";
    }

    // ТАП
    function doTap(e) {
        let m = mult * rMult * (isFed ? 2 : 1);
        let gain = pwr * m * (abType === 'h' ? 2 : 1);
        coins += gain;
        if(energy < 500) energy++;

        let paw = document.createElement('div');
        paw.className = 'paw';
        paw.innerText = '🐾';
        paw.style.left = e.clientX + 'px'; paw.style.top = e.clientY + 'px';
        paw.style.color = "hsl("+Math.random()*360+",100%,70%)";
        document.body.appendChild(paw);
        setTimeout(() => paw.remove(), 700);
        refresh();
    }

    // ПОКУПКА
    function buy(type, amt, base, grow) {
        let key = type + amt;
        let cost = (isFed ? p[key] * 0.7 : p[key]);
        let free = (abType === 'b' && Math.random() < 0.2);
        
        if(coins >= cost || free) {
            if(!free) coins -= cost;
            if(type === 'c') pwr += amt; else auto += amt;
            p[key] *= grow;
            refresh();
        }
    }

    // ВКЛАДКИ
    function openTab(id, btn) {
        document.querySelectorAll('.content').forEach(c => c.classList.remove('show'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active-btn'));
        document.getElementById(id).classList.add('show');
        btn.classList.add('active-btn');
    }

    // КУХНЯ
    function eat() {
        if(food >= 100 && !isFed) {
            food -= 100; isFed = true; fedT = 60;
            document.getElementById('bdy').classList.add('floating');
            refresh();
        }
    }

    // КОРОЛЬ
    function buyRoyal() {
        if(coins >= 50000 && rMult === 1) {
            coins -= 50000; rMult = 5;
            document.getElementById('rStatus').innerText = "Вы: КОРОЛЬ 👑";
            document.getElementById('rBtn').style.display = 'none';
            refresh();
        }
    }

    // КОСМОС
    function useAb(t) {
        if(energy >= 500) {
            energy = 0; abType = t; abT = 60;
            if(t==='h') document.getElementById('bdy').classList.add('floating');
            refresh();
        }
    }

    // ПЕРЕРОЖДЕНИЕ
    function doPrestige() {
        if(coins >= 100000) {
            mult += 1; food += 100; coins = 0; pwr = 1; auto = 0; energy = 0;
            p = { c1:10, c10:150, c100:2000, c1000:30000, a1:50, a10:800 };
            isFed = false; fedT = 0; abType = null; abT = 0;
            document.getElementById('bdy').classList.remove('floating');
            refresh();
        }
    }

    // БОГ
    function god() {
        if(prompt("ПАРОЛЬ") === "CATGOD2026") {
            document.getElementById('godBtn').style.display = 'block';
        }
    }
    function money(n) { coins += n; refresh(); }

    // ЦИКЛ
    setInterval(() => {
        let m = mult * rMult * (isFed ? 2 : 1);
        coins += (auto * m);
        if(fedT > 0) {
            fedT--;
            if(fedT <= 0) { isFed = false; if(abType!=='h') document.getElementById('bdy').classList.remove('floating'); }
        }
        if(abT > 0) {
            abT--;
            if(abT <= 0) { abType = null; if(!isFed) document.body.classList.remove('floating'); }
        }
        refresh();
    }, 1000);

    refresh();
</script>
</body>
</html>
