<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cat Clicker Pro Balance</title>
    <style>
        body { 
            text-align: center; font-family: 'Segoe UI', sans-serif; 
            background: #ffe4e1; margin: 0; padding-top: 60px; overflow-x: hidden;
        }
        #top-stats {
            position: fixed; top: 10px; right: 10px; background: rgba(255, 255, 255, 0.9);
            padding: 10px; border-radius: 15px; text-align: right; box-shadow: 0 4px 6px rgba(0,0,0,0.1); z-index: 1000;
        }
        .stat-line { font-size: 14px; color: #d63384; font-weight: bold; }
        .tab { display: none; padding: 20px; }
        .active { display: block; }
        button { 
            padding: 12px 20px; margin: 8px; cursor: pointer; background: #ff69b4; 
            color: white; border: none; border-radius: 10px; font-weight: bold; transition: 0.2s;
        }
        button:active { transform: scale(0.95); }
        button:disabled { background: #ccc; cursor: not-allowed; }
        .stats { font-size: 24px; color: #d63384; margin: 10px; font-weight: bold; }
        #cat-farm { display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; margin: 20px auto; min-height: 200px; }
        #cat { width: 180px; cursor: pointer; touch-action: manipulation; -webkit-user-select: none; user-select: none; transition: transform 0.1s; }
        #cat:active { transform: scale(0.9); }
        .cat-mini { width: 50px; height: 50px; object-fit: contain; animation: bounce 2s infinite ease-in-out; }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }
        .click-effect { position: absolute; color: #ff1493; font-weight: bold; font-size: 24px; pointer-events: none; animation: flyUp 0.8s forwards; z-index: 9999; }
        @keyframes flyUp { 0% { opacity: 1; transform: translateY(0); } 100% { opacity: 0; transform: translateY(-100px); } }
        #admin-panel { display: none; background: #ffcccc; padding: 15px; border: 2px solid red; margin: 20px; border-radius: 15px; }
    </style>
</head>
<body>

    <div id="top-stats">
        <div class="stat-line">Множитель: x<span id="multDisplay">1.0</span></div>
        <div class="stat-line">Доход: <span id="cpsDisplay">0</span>/сек</div>
    </div>

    <h1>🐾 Cat Clicker Pro 🐾</h1>
    <div class="stats">Каткойнов: <span id="coins">0</span></div>
    <div style="font-size: 14px; color: #888;">Всего накоплено: <span id="totalLifetime">0</span></div>
    
    <div id="cat-farm">
        <img id="cat" src="https://cdn-icons-png.flaticon.com/512/616/616430.png" alt="Кот">
    </div>
    
    <div class="tabs">
        <button onclick="showTab('upgrades')">Клики</button>
        <button onclick="showTab('auto')">Авто</button>
        <button onclick="showTab('special')">Королевский</button>
        <button onclick="showTab('prestige')">Перерождение</button>
    </div>

    <div id="upgrades" class="tab active">
        <button id="btnClick1" onclick="buyUpgrade('click', 1, 'priceClick1')">+1 сила (<span id="priceClick1">10</span> 🐾)</button>
        <button id="btnClick10" onclick="buyUpgrade('click', 10, 'priceClick10')">+10 сила (<span id="priceClick10">100</span> 🐾)</button>
        <button id="btnClick1000" onclick="buyUpgrade('click', 1000, 'priceClick1000')">+1000 сила (<span id="priceClick1000">10000</span> 🐾)</button>
    </div>
    
    <div id="auto" class="tab">
        <button id="btnAuto1" onclick="buyUpgrade('auto', 1, 'priceAuto1')">+1/сек (<span id="priceAuto1">100</span> 🐾)</button>
        <button id="btnAuto10" onclick="buyUpgrade('auto', 10, 'priceAuto10')">+10/сек (<span id="priceAuto10">1000</span> 🐾)</button>
        <button id="btnAuto100" onclick="buyUpgrade('auto', 100, 'priceAuto100')">+100/сек (<span id="priceAuto100">10000</span> 🐾)</button>
    </div>
    
    <div id="special" class="tab">
        <button id="royalBtn" onclick="buyRoyal()">Королевский режим (50к 🐾, 5x, +30 сила)</button>
    </div>
    
    <div id="prestige" class="tab">
        <button id="prestigeBtn" onclick="doPrestige()" disabled>Перерождение (100к 🐾)</button>
    </div>

    <div id="admin-panel">
        <h3>Админ-панель 🛠️</h3>
        <input type="number" id="cheatCoins" placeholder="Сумма">
        <button onclick="cheat()">Добавить</button>
    </div>

    <script>
        let coins = 0;
        let totalLifetime = 0;
        let clickPower = 1;
        let autoCPS = 0;
        let royalMult = 1;
        let royalBonus = 0;
        let prestigeMult = 1;
        let prestigeCount = 0;

        // Объект с ценами
        let prices = {
            priceClick1: 10, priceClick10: 100, priceClick1000: 10000,
            priceAuto1: 100, priceAuto10: 1000, priceAuto100: 10000
        };

        const catMain = document.getElementById('cat');

        function update() {
            document.getElementById('coins').innerText = Math.floor(coins);
            document.getElementById('totalLifetime').innerText = Math.floor(totalLifetime);
            document.getElementById('multDisplay').innerText = (royalMult * prestigeMult).toFixed(1);
            document.getElementById('cpsDisplay').innerText = autoCPS;
            document.getElementById('prestigeBtn').disabled = coins < 100000;
            
            // Обновляем цены в интерфейсе
            for (let key in prices) {
                document.getElementById(key).innerText = Math.floor(prices[key]);
            }
            
            if (totalLifetime >= 1000000) document.getElementById('admin-panel').style.display = 'block';
        }

        catMain.addEventListener('click', (e) => {
            let gain = (clickPower + royalBonus) * royalMult * prestigeMult;
            coins += gain;
            totalLifetime += gain;
            createClickEffect(e.pageX, e.pageY, "+" + Math.floor(gain));
            update();
        });

        function createClickEffect(x, y, text) {
            const effect = document.createElement('div');
            effect.className = 'click-effect';
            effect.style.left = (x - 10) + 'px';
            effect.style.top = (y - 20) + 'px';
            effect.innerText = text;
            document.body.appendChild(effect);
            setTimeout(() => effect.remove(), 800);
        }

        // Универсальная функция покупки с ростом цены
        function buyUpgrade(type, amount, priceKey) {
            let cost = prices[priceKey];
            if (coins >= cost) {
                coins -= cost;
                if (type === 'click') clickPower += amount;
                if (type === 'auto') autoCPS += amount;
                
                // Рост цены на 15%
                prices[priceKey] = Math.ceil(prices[priceKey] * 1.15);
                update();
            }
        }

        function buyRoyal() {
            if (coins >= 50000) { 
                coins -= 50000; royalMult = 5; royalBonus = 30; 
                document.getElementById('royalBtn').disabled = true; update(); 
            }
        }

        function doPrestige() {
            if (coins >= 100000) {
                prestigeCount++;
                prestigeMult += 0.5;
                coins = 0; clickPower = 1; autoCPS = 0; royalMult = 1; royalBonus = 0;
                // Сброс цен (по желанию можно оставить, но обычно сбрасывают)
                prices = { priceClick1: 10, priceClick10: 100, priceClick1000: 10000, priceAuto1: 100, priceAuto10: 1000, priceAuto100: 10000 };
                document.getElementById('royalBtn').disabled = false;
                const miniCat = document.createElement('img');
                miniCat.src = "https://cdn-icons-png.flaticon.com/512/616/616430.png";
                miniCat.className = "cat-mini";
                document.getElementById('cat-farm').appendChild(miniCat);
                update();
                alert("Перерождение! Мир сброшен, множитель вырос!");
            }
        }

        function cheat() {
            let val = parseInt(document.getElementById('cheatCoins').value);
            if (!isNaN(val)) { coins += val; totalLifetime += val; update(); }
        }

        function showTab(id) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        setInterval(() => { coins += autoCPS; totalLifetime += autoCPS; update(); }, 1000);
        update(); // Первый запуск
    </script>
</body>
</html>
