<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cat Clicker: Cosmic Evolution Final</title>
    <style>
        body { text-align: center; font-family: 'Segoe UI', sans-serif; background: #0a0a1a; color: #fff; margin: 0; padding: 10px; }
        .tab { display: none; padding: 20px; border: 1px solid #333; margin-top: 10px; background: #16162e; }
        .active { display: block; }
        button { padding: 12px; margin: 5px; cursor: pointer; background: #2a2a4e; color: #fff; border: 1px solid #4a4a8e; font-weight: bold; }
        button:hover { background: #3a3a6e; }
        .stat-panel { background: #000; padding: 15px; border: 2px solid #00d2ff; margin-bottom: 20px; }
        #cat { width: 180px; cursor: pointer; }
        .admin-box { border: 2px solid #ff4757; padding: 15px; margin-top: 20px; }
    </style>
</head>
<body>

    <div class="stat-panel">
        <h1>✨ Cosmic Cat Clicker ✨</h1>
        <div>🐾 Коины: <span id="coinsDisplay">0</span></div>
        <div>⚡ Сила клика: <span id="clickPowerDisplay">1</span></div>
        <div>⚙️ Авто-доход: <span id="cpsDisplay">0</span>/сек</div>
        <div>🌌 Множитель: x<span id="multDisplay">1.0</span></div>
    </div>

    <img id="cat" src="https://cdn-icons-png.flaticon.com/512/616/616430.png">

    <div class="tabs-menu">
        <button onclick="showTab('upgrades')">Магазин</button>
        <button onclick="showTab('cosmos')">🌌 Космос</button>
        <button onclick="showTab('special')">👑 Король</button>
        <button onclick="showTab('prestige')">Перерождение</button>
        <button onclick="showTab('admin')" id="adminBtn" style="display:none; color: gold;">🛠 Админка</button>
    </div>

    <div id="upgrades" class="tab active">
        <h3>Улучшения</h3>
        <button onclick="buyUpgrade('click', 1, 'pC1', 1.15)">+1 сила (<span id="pC1">10</span>)</button>
        <button onclick="buyUpgrade('auto', 1, 'pA1', 1.2)">+1/сек (<span id="pA1">100</span>)</button>
    </div>

    <div id="cosmos" class="tab">
        <h2>Космические способности</h2>
        <div id="timerDisplay" style="color: yellow;"></div>
        <button onclick="activateAbility('lazy')">💤 Ленивый Кот (x10 Авто)</button>
        <p>Описание: Авто-доход увеличивается в 10 раз, клик отключается.</p>
        
        <button onclick="activateAbility('tygydyk')">🐈 Ночной Тыгыдык (Заряд)</button>
        <p>Описание: Накапливает силу клика каждую секунду.</p>
        
        <button onclick="activateAbility('lucky')">🍀 Кот Удачи (Крит)</button>
        <p>Описание: Шанс на критический клик x50.</p>
    </div>

    <div id="special" class="tab">
        <button onclick="buyRoyal()">👑 Купить Королевский режим (50к, x5 множитель)</button>
    </div>

    <div id="prestige" class="tab">
        <button id="prestigeBtn" onclick="doPrestige()" disabled>Перерождение (100к 🐾)</button>
    </div>

    <div id="admin" class="tab">
        <div class="admin-box">
            <h2>⚡ ПАНЕЛЬ БОГА ⚡</h2>
            <button onclick="coins+=1000000; update();">+1М Коинов</button>
            <button onclick="prestigeMult+=10; update();">+10 Мульти</button>
            <button onclick="clickPower+=500; update();">+500 Сила</button>
            <button onclick="autoCPS+=500; update();">+500 Авто</button>
            <button onclick="startRain()">🐱 Дождь</button>
            <button onclick="location.reload()">🔄 Сброс</button>
        </div>
    </div>

    <img id="paw" src="https://cdn-icons-png.flaticon.com/512/36/36467.png" style="width:30px; cursor:pointer; position:fixed; bottom:10px; left:10px;">

    <script>
        let coins=0, clickPower=1, autoCPS=0, prestigeMult=1, royalMult=1, ability=null;
        let prices={pC1:10, pA1:100};
        
        function update() {
            document.getElementById('coinsDisplay').innerText = Math.floor(coins);
            document.getElementById('clickPowerDisplay').innerText = clickPower;
            document.getElementById('cpsDisplay').innerText = Math.floor(autoCPS);
            document.getElementById('multDisplay').innerText = (prestigeMult * royalMult).toFixed(1);
            document.getElementById('prestigeBtn').disabled = coins < 100000;
            document.getElementById('pC1').innerText = Math.floor(prices.pC1);
            document.getElementById('pA1').innerText = Math.floor(prices.pA1);
        }

        document.getElementById('cat').onclick = () => {
            if(ability !== 'lazy') coins += clickPower * prestigeMult * royalMult;
            update();
        };

        function buyUpgrade(type, amt, key, grow) {
            if(coins >= prices[key]) {
                coins -= prices[key];
                if(type=='click') clickPower+=amt; else autoCPS+=amt;
                prices[key]*=grow;
                update();
            }
        }

        function activateAbility(a) { 
            ability=a; 
            document.getElementById('timerDisplay').innerText = "Способность " + a + " активна!";
            setTimeout(() => { ability=null; document.getElementById('timerDisplay').innerText=""; }, 30000);
        }

        function buyRoyal() { if(coins>=50000) { coins-=50000; royalMult=5; update(); } }
        
        function doPrestige() {
            if(coins>=100000) {
                coins=0; clickPower=1; autoCPS=0; prestigeMult+=0.5;
                update();
            }
        }

        function showTab(id) { document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active')); document.getElementById(id).classList.add('active'); }
        
        document.getElementById('paw').onclick = () => { document.getElementById('adminBtn').style.display='inline-block'; };

        setInterval(() => {
            coins += (ability === 'lazy' ? autoCPS*10 : autoCPS) * prestigeMult * royalMult;
            update();
        }, 1000);

        function startRain() { /* Логика дождя */ }
    </script>
</body>
</html>
