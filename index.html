<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Space Cat Clicker: Ultimate</title>
    <style>
        :root {
            --p: #6a11cb; --b: #2575fc; --g: #ffd700;
            --red: #ff4757; --green: #2ecc71; --blue: #3498db;
        }
        body {
            margin: 0; background: #050510; color: white;
            font-family: 'Segoe UI', Arial, sans-serif; text-align: center;
            overflow: hidden; height: 100vh;
            background-image: radial-gradient(circle at 50% 50%, #111 0%, #050510 100%);
        }
        canvas { position: fixed; top: 0; left: 0; pointer-events: none; z-index: 1; }
        .ui { position: relative; z-index: 10; padding-top: 80px; height: 100vh; overflow-y: auto; pointer-events: none; }
        .inter { pointer-events: auto; }

        /* ЛАМПОЧКИ (ВХОД) */
        .lights { position: fixed; top: 15px; left: 15px; display: flex; gap: 10px; z-index: 10000; }
        .light { width: 25px; height: 25px; border-radius: 50%; cursor: pointer; border: 2px solid rgba(255,255,255,0.3); transition: 0.3s; }
        .l-red { background: var(--red); box-shadow: 0 0 10px var(--red); }
        .l-green { background: var(--green); box-shadow: 0 0 10px var(--green); }
        .l-blue { background: var(--blue); box-shadow: 0 0 10px var(--blue); }

        /* ПАНЕЛЬ СТАТИСТИКИ */
        .top-bar {
            position: fixed; top: 0; width: 100%; height: 75px;
            background: rgba(0,0,0,0.9); display: flex; justify-content: space-around;
            align-items: center; border-bottom: 2px solid var(--p); z-index: 1000;
        }
        .st b { display: block; font-size: 20px; color: var(--blue); }

        #coins { font-size: 50px; font-weight: 900; color: var(--g); text-shadow: 0 0 20px orange; margin: 15px 0; }
        #cat { width: 220px; cursor: pointer; transition: 0.1s; filter: drop-shadow(0 0 20px var(--p)); margin: 20px; }
        #cat:active { transform: scale(0.9) rotate(-3deg); }

        /* ВКЛАДКИ */
        .tabs { display: flex; justify-content: center; gap: 10px; margin: 20px; }
        .t-btn {
            background: #1a1a2e; border: 1px solid var(--blue); color: white;
            padding: 12px 24px; border-radius: 10px; cursor: pointer; font-weight: bold;
        }
        .t-btn.active { background: var(--p); border-color: white; box-shadow: 0 0 15px var(--p); }

        /* СЕКЦИИ */
        .sec { display: none; max-width: 500px; margin: 0 auto 150px; padding: 20px; background: rgba(0,0,0,0.8); border-radius: 20px; border: 1px solid #333; }
        .active-sec { display: block; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* МАГАЗИН */
        .item {
            background: rgba(255,255,255,0.05); margin-bottom: 12px; padding: 15px;
            border-radius: 12px; display: flex; justify-content: space-between; align-items: center;
            border-left: 5px solid var(--red); transition: 0.2s;
        }
        .item:hover { background: rgba(255,255,255,0.1); }
        .item.auto { border-left-color: var(--green); }
        .buy-btn { background: var(--p); border: none; color: white; padding: 10px 18px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .buy-btn:disabled { background: #444; opacity: 0.5; }

        /* КОРОЛЕВСКИЙ РЕЖИМ */
        #royal-btn {
            background: linear-gradient(45deg, #f1c40f, #e67e22); color: black;
            width: 100%; margin-bottom: 15px; display: none; border: none; padding: 15px; font-size: 18px;
        }

        /* АДМИНКА */
        .adm-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .adm-btn {
            background: #111; border: 2px solid var(--red); color: var(--red);
            padding: 15px; border-radius: 8px; cursor: pointer; font-weight: bold;
        }
        .adm-btn:hover { background: var(--red); color: white; }
    </style>
</head>
<body>

    <canvas id="fxCanvas"></canvas>

    <div class="lights inter">
        <div class="light l-blue" onclick="press('blue')"></div>
        <div class="light l-green" onclick="press('green')"></div>
        <div class="light l-red" onclick="press('red')"></div>
    </div>

    <div class="top-bar">
        <div class="st">КЛИК<b id="st-pwr">1</b></div>
        <div class="st">АВТО<b id="st-auto">0</b></div>
        <div class="st">MULT<b id="st-mult">x1.0</b></div>
    </div>

    <div class="ui">
        <div id="coins" class="inter">0</div>
        <img id="cat" class="inter" src="https://cdn-icons-png.flaticon.com/512/616/616430.png" onmousedown="tap(event)">

        <div class="tabs inter">
            <button class="t-btn active" onclick="showTab(event, 'shop')">🛒 МАГАЗИН</button>
            <button class="t-btn" onclick="showTab(event, 'spirit')">✨ ДУХ</button>
            <button id="god-tab" class="t-btn" style="display:none; color:lime;" onclick="showTab(event, 'admin')">🛠 БОГ</button>
        </div>

        <div id="shop" class="sec active-sec inter">
            <button id="royal-btn" class="inter" onclick="toggleRoyal()">👑 КОРОЛЕВСКИЙ РЕЖИМ (x10)</button>
            
            <h3>Клики</h3>
            <div class="item"><div><b>Лапа</b><p>+1 к клику</p></div><button class="buy-btn" onclick="buy('c',1,'p1',1.15)">💰 <span id="p1">10</span></button></div>
            <div class="item"><div><b>Мега-Лапа</b><p>+10 к клику</p></div><button class="buy-btn" onclick="buy('c',10,'p10',1.2)">💰 <span id="p10">150</span></button></div>
            <div class="item"><div><b>Ультра-Лапа</b><p>+100 к клику</p></div><button class="buy-btn" onclick="buy('c',100,'p100',1.25)">💰 <span id="p100">1500</span></button></div>
            <div class="item"><div><b>Бог-Кот</b><p>+1000 к клику</p></div><button class="buy-btn" onclick="buy('c',1000,'p1000',1.3)">💰 <span id="p1000">20000</span></button></div>

            <h3>Автокликеры (ДЕШЕВЛЕ!)</h3>
            <div class="item auto"><div><b>Кот-Бот</b><p>+1/сек</p></div><button class="buy-btn" onclick="buy('a',1,'a1',1.15)">💰 <span id="a1">25</span></button></div>
            <div class="item auto"><div><b>Кото-Ферма</b><p>+10/сек</p></div><button class="buy-btn" onclick="buy('a',10,'a10',1.2)">💰 <span id="a10">350</span></button></div>
            <div class="item auto"><div><b>Кото-Завод</b><p>+100/сек</p></div><button class="buy-btn" onclick="buy('a',100,'a100',1.25)">💰 <span id="a100">4000</span></button></div>
            <div class="item auto"><div><b>Галактика Котов</b><p>+1000/сек</p></div><button class="buy-btn" onclick="buy('a',1000,'a1000',1.3)">💰 <span id="a1000">45000</span></button></div>
        </div>

        <div id="spirit" class="sec inter">
            <h2>✨ Перерождение</h2>
            <p>Текущий множитель: <b id="cur-mult">1.0</b></p>
            <button class="t-btn" style="width:100%" onclick="prestige()">СБРОС ЗА 100,000</button>
        </div>

        <div id="admin" class="sec inter">
            <h2 style="color:red">🛠 ПАНЕЛЬ ТВОРЦА</h2>
            <div class="adm-grid">
                <button class="adm-btn" onclick="coins+=1000000000; update()">+1 МЛРД</button>
                <button class="adm-btn" onclick="mult+=10; update()">+10 ПЕРЕР.</button>
                <button class="adm-btn" id="free-btn" onclick="toggleFree()">FREE: OFF</button>
                <button class="adm-btn" onclick="catFall()">🐱 ВОДОПАД</button>
                <button class="adm-btn" onclick="autoP = !autoP">AUTO SPIRIT</button>
                <button class="adm-btn" onclick="location.reload()">СБРОС ВСЕГО</button>
            </div>
        </div>
    </div>

    <script>
        let coins=0, pwr=1, auto=0, mult=1, isFree=false, royal=false, autoP=false;
        let pr = { p1:10, p10:150, p100:1500, p1000:20000, a1:25, a10:350, a100:4000, a1000:45000 };
        let inputCode = [];

        function press(color) {
            inputCode.push(color);
            if(inputCode.join(',').includes('blue,green,red')) {
                document.getElementById('god-tab').style.display = 'block';
                document.getElementById('royal-btn').style.display = 'block';
                alert("РЕЖИМ БОГА АКТИВИРОВАН!");
                inputCode = [];
            }
            if(inputCode.length > 5) inputCode.shift();
        }

        function update() {
            let m = mult * (royal ? 10 : 1);
            document.getElementById('coins').innerText = Math.floor(coins).toLocaleString();
            document.getElementById('st-pwr').innerText = Math.floor(pwr * m);
            document.getElementById('st-auto').innerText = Math.floor(auto * m);
            document.getElementById('st-mult').innerText = 'x' + m.toFixed(1);
            document.getElementById('cur-mult').innerText = mult.toFixed(1);
            
            for(let k in pr) {
                let el = document.getElementById(k);
                if(el) el.innerText = isFree ? "0" : Math.floor(pr[k]).toLocaleString();
            }
        }

        function tap(e) {
            let m = mult * (royal ? 10 : 1);
            coins += pwr * m;
            spawnPart(e.clientX, e.clientY, '🐾');
            update();
        }

        function buy(type, amt, id, growth) {
            let cost = isFree ? 0 : pr[id];
            if(coins >= cost) {
                if(!isFree) coins -= cost;
                if(type === 'c') pwr += amt; else auto += amt;
                pr[id] *= growth;
                update();
            }
        }

        function toggleFree() { 
            isFree = !isFree; 
            document.getElementById('free-btn').innerText = isFree ? "FREE: ON" : "FREE: OFF";
            update();
        }

        function toggleRoyal() { royal = !royal; update(); }

        function prestige() {
            if(coins >= 100000) {
                coins=0; pwr=1; auto=0; mult++;
                pr = { p1:10, p10:150, p100:1500, p1000:20000, a1:25, a10:350, a100:4000, a1000:45000 };
                update();
            }
        }

        function catFall() {
            let i = 0;
            let timer = setInterval(() => {
                coins += 1000000;
                spawnPart(Math.random() * window.innerWidth, -50, '🐱');
                i++; if(i > 50) clearInterval(timer);
                update();
            }, 100);
        }

        // ЭФФЕКТЫ
        const canvas = document.getElementById('fxCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        let particles = [];

        function spawnPart(x, y, char) {
            particles.push({ x, y, vy: 5, a: 1, text: char });
        }

        function animate() {
            ctx.clearRect(0,0,canvas.width, canvas.height);
            particles.forEach((p, i) => {
                p.y += p.vy; p.a -= 0.02;
                ctx.globalAlpha = p.a;
                ctx.font = "30px Arial";
                ctx.fillText(p.text, p.x, p.y);
                if(p.a <= 0) particles.splice(i, 1);
            });
            requestAnimationFrame(animate);
        }

        function showTab(e, id) {
            document.querySelectorAll('.sec').forEach(s => s.classList.remove('active-sec'));
            document.querySelectorAll('.t-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active-sec');
            e.currentTarget.classList.add('active');
        }

        setInterval(() => {
            coins += auto * mult * (royal ? 10 : 1);
            if(autoP && coins >= 100000) prestige();
            update();
        }, 1000);

        animate(); update();
    </script>
</body>
</html>
